<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unicorn Swag Quiz 🦄</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #ff9ff3, #f368e0, #ff6b81);
    text-align: center;
    color: white;
}

.container {
    max-width: 700px;
    margin: auto;
    padding: 20px;
}

h1 {
    font-size: 40px;
    margin-bottom: 10px;
}

.unicorns {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 20px;
}

.unicorns img {
    width: 80px;
    animation: float 3s infinite ease-in-out;
}

@keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-15px); }
    100% { transform: translateY(0px); }
}

.quiz-box {
    background: rgba(255,255,255,0.15);
    padding: 20px;
    border-radius: 20px;
    backdrop-filter: blur(10px);
}

.question {
    font-size: 20px;
    margin-bottom: 15px;
}

.answers button {
    display: block;
    width: 100%;
    margin: 10px 0;
    padding: 10px;
    border-radius: 20px;
    border: none;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
}

.answers button:hover {
    transform: scale(1.05);
}

#nextBtn {
    margin-top: 15px;
    padding: 10px 20px;
    border-radius: 20px;
    border: none;
    background: #fff;
    color: #ff1493;
    font-weight: bold;
    cursor: pointer;
}

.meter-container {
    margin-top: 20px;
    height: 25px;
    background: #fff;
    border-radius: 20px;
    overflow: hidden;
}

.meter {
    height: 100%;
    width: 0%;
    transition: width 1s ease;
    background: linear-gradient(90deg, #00ffcc, #ff00cc);
}

.result {
    font-size: 24px;
    margin-top: 15px;
}

.hidden {
    display: none;
}
</style>
</head>

<body>

<div class="container">
    <h1>🦄 Ultimate Swag Quiz 🦄</h1>

    <div class="unicorns">
        <img src="https://cdn.pixabay.com/photo/2017/01/31/13/14/unicorn-2025193_1280.png">
        <img src="https://cdn.pixabay.com/photo/2017/01/31/13/14/unicorn-2025193_1280.png">
        <img src="https://cdn.pixabay.com/photo/2017/01/31/13/14/unicorn-2025193_1280.png">
    </div>

    <div class="quiz-box" id="quiz">
        <div class="question" id="question"></div>
        <div class="answers" id="answers"></div>
        <button id="nextBtn" onclick="nextQuestion()">Next</button>
    </div>

    <div id="resultBox" class="hidden">
        <h2>Your Swag Level 🦄</h2>
        <div class="meter-container">
            <div class="meter" id="meter"></div>
        </div>
        <div class="result" id="resultText"></div>

        <div class="unicorns">
            <img src="https://cdn.pixabay.com/photo/2017/01/31/13/14/unicorn-2025193_1280.png">
            <img src="https://cdn.pixabay.com/photo/2017/01/31/13/14/unicorn-2025193_1280.png">
            <img src="https://cdn.pixabay.com/photo/2017/01/31/13/14/unicorn-2025193_1280.png">
        </div>
    </div>
</div>

<script>
const questions = [
{
    question: "Pick your ideal ride:",
    answers: [
        { text: "Skateboard 🛹", score: 10 },
        { text: "Sports Car 🏎️", score: 20 },
        { text: "Flying Unicorn 🦄", score: 30 }
    ]
},
{
    question: "Your outfit vibe?",
    answers: [
        { text: "Comfy hoodie", score: 10 },
        { text: "Designer drip 💎", score: 20 },
        { text: "Glitter cape with sparkles ✨", score: 30 }
    ]
},
{
    question: "Theme song when you enter a room?",
    answers: [
        { text: "Lo-fi beats", score: 10 },
        { text: "Hip hop anthem 🎤", score: 20 },
        { text: "Magical unicorn orchestra 🦄✨", score: 30 }
    ]
}
];

let currentQuestion = 0;
let totalScore = 0;

function showQuestion() {
    const q = questions[currentQuestion];
    document.getElementById("question").innerText = q.question;
    const answersDiv = document.getElementById("answers");
    answersDiv.innerHTML = "";

    q.answers.forEach(answer => {
        const button = document.createElement("button");
        button.innerText = answer.text;
        button.onclick = () => {
            totalScore += answer.score;
            nextQuestion();
        };
        answersDiv.appendChild(button);
    });
}

function nextQuestion() {
    currentQuestion++;
    if (currentQuestion < questions.length) {
        showQuestion();
    } else {
        showResult();
    }
}

function showResult() {
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("resultBox").classList.remove("hidden");

    let percentage = Math.min(100, Math.round(totalScore / 90 * 100));
    document.getElementById("meter").style.width = percentage + "%";

    let resultText = "";

    if (percentage < 40) {
        resultText = "Swag Level: Mild Sparkle ✨";
    } else if (percentage < 70) {
        resultText = "Swag Level: Radiant Unicorn 🦄🔥";
    } else {
        resultText = "Swag Level: LEGENDARY UNICORN SUPREME 👑🦄";
    }

    document.getElementById("resultText").innerText = resultText + " (" + percentage + "%)";
}

showQuestion();
</script>

</body>
</html>

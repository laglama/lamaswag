<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unilord University Helper 👾🎓</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
    text-align: center;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

h1 {
    margin-bottom: 5px;
}

.mascot {
    margin: 20px auto;
}

.mascot img {
    width: 120px;
    animation: bounce 2s infinite;
}

@keyframes bounce {
    0%,100% { transform: translateY(0);}
    50% { transform: translateY(-10px);}
}

.speech {
    background: white;
    color: black;
    padding: 10px;
    border-radius: 15px;
    display: inline-block;
    margin-top: 10px;
    max-width: 300px;
}

.section {
    background: rgba(255,255,255,0.1);
    padding: 20px;
    border-radius: 15px;
    margin: 15px 0;
    text-align: left;
}

label {
    display: block;
    margin: 8px 0;
}

input, textarea, select {
    width: 100%;
    padding: 8px;
    border-radius: 8px;
    border: none;
    margin-top: 5px;
}

button {
    margin-top: 15px;
    padding: 12px 25px;
    border-radius: 25px;
    border: none;
    background: #00c6ff;
    color: white;
    font-weight: bold;
    cursor: pointer;
    font-size: 16px;
}

.result {
    margin-top: 20px;
    background: rgba(0,0,0,0.4);
    padding: 15px;
    border-radius: 10px;
    text-align: left;
}

.progress-bar {
    height: 20px;
    background: #333;
    border-radius: 20px;
    overflow: hidden;
    margin-top: 10px;
}

.progress {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #00ffcc, #00c6ff);
    transition: 0.5s;
}
</style>
</head>

<body>

<div class="container">
    <h1>👾 Unilord's University Helper 🎓</h1>
    <p>Your cute guide to getting accepted!</p>

    <!-- Mascot -->
    <div class="mascot">
        <img src="https://cdn-icons-png.flaticon.com/512/4712/4712027.png">
        <div class="speech" id="mascotSpeech">
            Hi! I'm Unilord 👾 Let's build your perfect application!
        </div>
    </div>

    <!-- Form -->
    <div class="section">
        <h3>📌 Personal Info</h3>
        <label>Name <input type="text" id="name"></label>
        <label>Email <input type="email" id="email"></label>
    </div>

    <div class="section">
        <h3>📚 Academics</h3>
        <label>GPA <input type="number" id="gpa" step="0.1"></label>
        <label>Test Score <input type="number" id="testScore"></label>
    </div>

    <div class="section">
        <h3>📝 Materials</h3>
        <label><input type="checkbox" id="essay"> Essay Done</label>
        <label><input type="checkbox" id="rec"> Recommendation Letters</label>
        <label><input type="checkbox" id="activities"> Activities Listed</label>
    </div>

    <div class="section">
        <h3>🎯 Submission</h3>
        <label>Universities Applied <input type="number" id="unis"></label>
        <label>Status
            <select id="submitted">
                <option value="no">Not Submitted</option>
                <option value="yes">Submitted</option>
            </select>
        </label>
    </div>

    <button onclick="checkApp()">Check with Unilord 👾</button>

    <div class="result" id="result"></div>

    <div class="progress-bar">
        <div class="progress" id="progress"></div>
    </div>

</div>

<script>
function speak(msg) {
    document.getElementById("mascotSpeech").innerText = msg;
}

function checkApp() {
    let score = 0;
    let issues = [];

    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;
    let gpa = parseFloat(document.getElementById("gpa").value);
    let test = parseInt(document.getElementById("testScore").value);
    let essay = document.getElementById("essay").checked;
    let rec = document.getElementById("rec").checked;
    let act = document.getElementById("activities").checked;
    let unis = parseInt(document.getElementById("unis").value);
    let submitted = document.getElementById("submitted").value;

    if(!name){ issues.push("Missing name"); speak("Hey! I need your name 👀"); }
    else score+=10;

    if(!email.includes("@")){ issues.push("Invalid email"); speak("That email looks sus 😬"); }
    else score+=10;

    if(!gpa || gpa<2.5){ issues.push("Low GPA"); speak("We might need to boost your academics 📚"); }
    else score+=15;

    if(!test || test<900){ issues.push("Low test score"); speak("Try improving your test score 💪"); }
    else score+=15;

    if(!essay){ issues.push("Missing essay"); speak("Your story matters! Write that essay ✍️"); }
    else score+=10;

    if(!rec){ issues.push("No recommendations"); speak("Teachers gotta hype you up 😎"); }
    else score+=10;

    if(!act){ issues.push("No activities"); speak("Show your personality with activities 🌟"); }
    else score+=10;

    if(!unis || unis<3){ issues.push("Too few universities"); speak("Apply to more schools 🎯"); }
    else score+=10;

    if(submitted==="no"){ issues.push("Not submitted"); speak("Don't forget to submit! ⏰"); }
    else score+=10;

    let resultHTML = "<h3>📊 Unilord's Review</h3>";

    if(issues.length===0){
        resultHTML += "<p>✅ PERFECT APPLICATION 👑</p>";
        speak("YOU DID AMAZING!!! I'M PROUD 👾💙");
    } else {
        resultHTML += "<ul>";
        issues.forEach(i=> resultHTML+="<li>❌ "+i+"</li>");
        resultHTML += "</ul>";
    }

    resultHTML += "<p><strong>Score: "+score+"%</strong></p>";

    document.getElementById("result").innerHTML = resultHTML;
    document.getElementById("progress").style.width = score+"%";
}
</script>

</body>
</html>
